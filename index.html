<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Shop POS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <h1>My Shop POS</h1>
    <span id="clock"></span>
    <button onclick="showLog()">Sales Log</button>
    <button onclick="showStock()">+ Stock</button>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="pos-layout">

    <!-- LEFT: Products -->
    <div class="products-panel">
      <input type="text" id="search" placeholder="Search product..." oninput="filterProducts()">
      <div class="product-grid" id="product-grid"></div>
    </div>

    <!-- RIGHT: Cart -->
    <div class="cart-panel">
      <div class="cart-header">
        <h2>Cart</h2>
        <button onclick="clearCart()">Clear</button>
      </div>
      <div id="cart-items"></div>
      <div class="cart-footer">
        <input type="text" id="customer" placeholder="Customer name (optional)">
        <div class="total-line"><span>Subtotal:</span><span id="subtotal">Rs. 0</span></div>
        <div class="total-line">
          <span>Discount %:</span>
          <input type="number" id="discount" value="0" min="0" max="100" oninput="updateTotals()">
        </div>
        <div class="total-line grand"><span>TOTAL:</span><span id="grand-total">Rs. 0</span></div>
        <div class="pay-methods">
          <button class="pay-btn active" onclick="selectPay(this,'Cash')">Cash</button>
          <button class="pay-btn" onclick="selectPay(this,'Card')">Card</button>
          <button class="pay-btn" onclick="selectPay(this,'Online')">Online</button>
          <button class="pay-btn" onclick="selectPay(this,'Credit')">Credit</button>
        </div>
        <button id="checkout-btn" onclick="checkout()" disabled>Complete Sale</button>
      </div>
    </div>
  </div>

  <!-- SALES LOG PANEL -->
  <div class="log-panel hidden" id="log-panel">
    <button onclick="hideLog()">← Back to POS</button>
    <h2>Sales Log</h2>
    <div id="summary-cards"></div>
    <table id="sales-table">
      <thead>
        <tr><th>Receipt#</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Time</th></tr>
      </thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>

  <!-- RECEIPT POPUP -->
  <div class="modal hidden" id="receipt-modal">
    <div class="modal-box">
      <div id="receipt-content"></div>
      <div class="modal-btns">
        <button onclick="printReceipt()">Print Receipt</button>
        <button onclick="closeReceipt()">New Sale</button>
      </div>
    </div>
  </div>
 <!-- STOCK MANAGEMENT PANEL -->
<div class="log-panel hidden" id="stock-panel">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
    <button onclick="hideStock()">← Back to POS</button>
    <h2 style="font-size:16px">Stock Management</h2>
    <input type="text" id="stock-search" placeholder="Search products..."
      oninput="renderStockTable()"
      style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;width:200px">
  </div>

  <!-- ADD NEW PRODUCT FORM -->
  <div style="background:white;border-radius:12px;padding:18px;margin-bottom:16px;border:1px solid #e0e0e0">
    <h3 style="margin-bottom:14px;font-size:14px;color:#1a3c5e">+ Add New Product</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
      <input type="text"   id="np-name"  placeholder="Product name *"
        style="padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px">
      <input type="text"   id="np-cat"   placeholder="Category (e.g. Grocery)"
        style="padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px">
      <input type="number" id="np-price" placeholder="Selling price *" min="0"
        style="padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px">
      <input type="number" id="np-cost"  placeholder="Cost price" min="0"
        style="padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px">
      <input type="number" id="np-stock" placeholder="Starting stock *" min="0"
        style="padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px">
      <button onclick="addNewProduct()"
        style="padding:9px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold">
        Add Product
      </button>
    </div>
    <p id="add-msg" style="font-size:13px;min-height:18px"></p>
  </div>

  <!-- EDIT PRODUCT FORM (hidden until Edit is clicked) -->
  <div id="edit-panel" class="hidden"
    style="background:#fff8e1;border:1px solid #f39c12;border-radius:12px;padding:18px;margin-bottom:16px">
    <h3 style="margin-bottom:14px;font-size:14px;color:#b7770d">Edit Product</h3>
    <input type="hidden" id="edit-id">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
      <input type="text"   id="edit-name"  placeholder="Product name *"
        style="padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px">
      <input type="text"   id="edit-cat"   placeholder="Category"
        style="padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px">
      <input type="number" id="edit-price" placeholder="Selling price *" min="0"
        style="padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px">
      <input type="number" id="edit-cost"  placeholder="Cost price" min="0"
        style="padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px">
      <input type="number" id="edit-stock" placeholder="Current stock *" min="0"
        style="padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px">
      <div style="display:flex;gap:8px">
        <button onclick="saveEdit()"
          style="flex:1;padding:9px;background:#f39c12;color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold">
          Save Changes
        </button>
        <button onclick="cancelEdit()"
          style="padding:9px 14px;background:white;border:1px solid #ddd;border-radius:8px;cursor:pointer;font-size:13px">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- PRODUCT LIST TABLE -->
  <div style="background:white;border-radius:12px;border:1px solid #e0e0e0;overflow:hidden">
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="background:#1a3c5e;color:white">
          <th style="padding:11px 8px;text-align:left">Product</th>
          <th style="padding:11px 8px;text-align:left">Category</th>
          <th style="padding:11px 8px;text-align:center">Cost</th>
          <th style="padding:11px 8px;text-align:center">Price</th>
          <th style="padding:11px 8px;text-align:center">Stock</th>
          <th style="padding:11px 8px;text-align:center">Add Stock</th>
          <th style="padding:11px 8px;text-align:center">Actions</th>
        </tr>
      </thead>
      <tbody id="stock-table-body"></tbody>
    </table>
  </div>

</div>

  <script src="js/app.js"></script>
</body>
</html>
